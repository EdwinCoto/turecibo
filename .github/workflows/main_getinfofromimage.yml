# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - getinfofromImage

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: '3.12' # set this to the python version to use (supports 3.6, 3.7, 3.8)
  PYTHON_PACKAGE_DIR: '.python_packages/lib/site-packages'

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and start virtual environment
        run: |
          python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Add your test commands here, for example:
      - name: Run tests
        run: |
           source venv/bin/activate
           pytest tests/
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and start virtual environment
        run: |
          python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install --target="${{ env.PYTHON_PACKAGE_DIR }}" -r requirements.txt

      # Optional: Add step to run tests here

      - name: Remove local-only files from deployment package
        run: |
          rm -rf venv
          rm -f local.settings.json

      - name: Zip artifact for deployment
        run: |
          zip -r release.zip . \
            -x "venv/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x "tests/*" \
            -x "data/*" \
            -x "local.settings.json" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "*service-principal*.json" \
            -x "*service-account*.json" \
            -x "oauth-client*.json" \
            -x "google-oauth*.json" \
            -x "google_drive_token.json" \
            -x "google_oauth_token.json"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/
  deploy:
    runs-on: ubuntu-latest
    needs: [test, package]
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from package job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip
        
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1917AA85A723424A949BA6738DFEE2A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B1A8D3E9A2C3403E9EB145A0828F0648 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8B5F65B0D989452DBCEC49D769BD8FEC }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'getinfofromImage'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          